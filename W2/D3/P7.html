<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card: headers & footers, equal height, hover</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <section class="grid grid-cols-1 ms:grid-cols-2 lg:grid-cols-3 gap-6 p-4">
        <article class="rounded-xl shadow-sm p-6 overflow-hidden flex 
        flex-col transition duration-300 ease-out hover:-translate-y-2
        hover: shadow-lg">
        <header class="border flex items-center justify-between">
            <h2>Basic Version</h2>
        </header>
        <div class="p-6 space-y-2 flex-1">
            <p class="text-2xl">Rs. 1000/-</p>
        </div>
        <footer class="border-t px-6 py-4 flex justify-end gap-3">
            <button class="px-4 py-2 rounded border 
            hover:bg-green-500 transition">Details</button>
            <button class="px-4 py-2 rounded border 
            hover:bg-green-500 transition">Purchase</button>

        </footer>
        </article>
        <article class="rounded-xl shadow-sm p-6 overflow-hidden flex 
        flex-col transition duration-300 ease-out hover:-translate-y-2
        hover: shadow-lg">
        <header class="border flex items-center justify-between">
            <h2>Intermediate version</h2>
            <p class="flex-grow text-sm">Full width Desktop: one of the columns Contrary to popular belief, Lorem Ipsum is not simply random text. 
                It has roots in a piece of classical Latin literature from 45 BC, making it over 2000 years old.</p>
        </header>
        <div class="p-6 space-y-2 flex-1">
            <p class="text-2xl">Rs. 1000/-</p>
        </div>
        <footer class="border-t px-6 py-4 flex justify-end gap-3 mt-auto">
            <button class="px-4 py-2 rounded border 
            hover:bg-green-500 transition">Details</button>
            <button class="px-4 py-2 rounded border 
            hover:bg-green-500 transition">Purchase</button>
        </footer>
        </article>
    </section>
</body>
</html>
